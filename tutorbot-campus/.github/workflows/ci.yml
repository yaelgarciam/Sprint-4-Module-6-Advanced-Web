name: tutorbot-campus-ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/eureka-server
          - backend/api-gateway
          - backend/session-service
          - backend/evaluator-service
          - backend/exercise-service
          - backend/gap-detector-service
          - backend/learning-path-service
          - backend/notifier-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B verify

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ hashFiles('frontend/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: npm ci

      - name: Run frontend build
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: npm run build
