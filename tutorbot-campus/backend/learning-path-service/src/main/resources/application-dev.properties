spring.application.name=learning-path-service
server.port=8085

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27018
spring.data.mongodb.database=tutorbot_learning_paths

# Disable RabbitMQ listener for local dev
tutorbot.messaging.enabled=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Ollama
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=60000

# Eureka — disable for local dev
eureka.client.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
