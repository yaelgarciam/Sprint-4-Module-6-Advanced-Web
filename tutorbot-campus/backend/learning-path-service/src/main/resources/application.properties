spring.application.name=learning-path-service
server.port=8085

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27018
spring.data.mongodb.database=tutorbot_learning_paths

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Messaging toggle — true in production, override to false in dev
tutorbot.messaging.enabled=true

# Ollama LLM
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=60000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info
