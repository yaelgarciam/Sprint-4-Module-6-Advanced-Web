spring.application.name=gap-detector-service
server.port=8084

# Oracle DataSource
spring.datasource.url=jdbc:oracle:thin:@oracledb:1522/TESTDB
spring.datasource.username=Adolfo
spring.datasource.password=password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate — validate: existing Oracle tables, do NOT recreate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# SQL init
spring.sql.init.mode=never

# Messaging (RabbitMQ) — true in production, override to false in dev
tutorbot.messaging.enabled=true

# Ollama LLM
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=30000

# RabbitMQ queues
rabbitmq.queues.evaluation-completed=evaluation.completed
rabbitmq.queues.gap-detected=gap.detected
rabbitmq.queues.gap-detector-dlq=gap-detector.dlq

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000
